[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "timefixer"
version = "2026.05.25.2"
dependencies = [
  "watchdog",
]
requires-python = ">=3.7"
authors = [
  {name = "Ernesto Alfonso", email = "erjoalgo@gmail.com"},
]
maintainers = [
  {name = "Ernesto Alfonso", email = "erjoalgo@gmail.com"},
]
description = "A service to fix files with timestamps in the future."
readme = "README.md"
license = {file = "LICENSE"}
keywords = ["timefixer", "timestamp", "modified", "future"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python"
]

[project.urls]
Homepage = "https://github.com/erjoalgo/dotfiles/tree/master/bin/timefixer"
Documentation = "https://github.com/erjoalgo/dotfiles/tree/master/bin/timefixer/README.md"
Repository = "https://github.com/erjoalgo/dotfiles/tree/master/bin/timefixer"
"Bug Tracker" = "https://github.com/erjoalgo/dotfiles/issues"

[project.scripts]
timefixer = "timefixer:main"

[project.entry-points."timefixer.timefixer"]
timefixer = "timefixer:timefixer"

